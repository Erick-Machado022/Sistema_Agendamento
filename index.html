<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom px-3">
            <div class="container-fluid">

                <!-- Esquerda (Logo + Nome) -->
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="https://cdn-icons-png.flaticon.com/512/679/679720.png" class="logo-icon">
                    <strong>Agendamento Container</strong>
                </a>

     
                <div class="d-flex align-items-center gap-3 ms-auto">
                
                    <!-- Usuário -->
                    <span class="d-flex align-items-center">
                        <i class="bi bi-person me-1"></i>
                        João Silva
                    </span>

                    <!-- Botão sair -->
                    <button class="btn btn-outline-danger btn-sm d-flex align-items-center">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Sair
                    </button>

                </div>

            </div>
        </nav>
    </header>

    <div class="container mt-4">

            <div class="header-titulo">
    <div class="container">
        <h2 class="fw-bold">Agendamentos de Containers</h2>
    </div>
</div>

        <div class="row g-3">

            <!-- Total -->
            <div class="col-md-3 teste ">
                <div class="card card-custom">
                    <div class="d-flex align-items-center gap-3">
                        <div class="icon-box icon-blue">
                            <i class="bi bi-box"><img class="total" src="img/caixa-azul.png" alt=""></i>
                        </div>
                        <div>
                            <small class="text-muted">Total</small>
                            <h4 class="mb-0 fw-bold font">2</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pendentes -->
            <div class="col-md-3">
                <div class="card card-custom">
                    <div class="d-flex align-items-center gap-3">
                            <div class="icon-box icon-yellow">
                                <i class="bi bi-calendar"><img class="total" src="img/pendente.png" alt=""></i>
                            </div>
                        <div>
                            <small class="text-muted">Pendentes</small>
                            <h4 class="mb-0 fw-bold">1</h4>
                        </div>
                    </div>  
                </div>
            </div>

            <!-- Confirmados -->
            <div class="col-md-3">
                <div class="card card-custom">
                    <div class="d-flex align-items-center gap-3">
                        <div class="icon-box icon-green">
                            <i class="bi bi-truck"><img class="total" src="img/caminhao.png" alt=""></i>
                        </div>
                    <div>
                        <small class="text-muted">Confirmados</small>
                        <h4 class="mb-0 fw-bold">1</h4>
                    </div>
                    </div>
                </div>
            </div>

            <!-- Botão -->
            <div class="col-md-3">
                <div class="card card-custom d-flex justify-content-center align-items-center h-100">
                    <button class="btn btn-primary w-100 btn-agendar">
                        <i class="bi bi-plus-lg me-2"></i>
                        Novo Agendamento
                    </button>
                </div>
            </div>

        </div>

        </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
