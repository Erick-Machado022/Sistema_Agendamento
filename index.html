<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Agendamentos</title>
</head>

<body>

<!-- NAVBAR -->
<header class="bg-white border-bottom">
    <nav class="navbar px-3">
        <div class="container-fluid">

            <div class="d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679720.png" class="logo-icon">
                <strong>Agendamento Container</strong>
            </div>

            <div class="d-flex align-items-center gap-3 ms-auto">
                <span>João Silva</span>

                <button class="btn btn-outline-danger btn-sm">
                    Sair
                </button>
            </div>

        </div>
    </nav>
</header>

<!-- HEADER (faixa cinza) -->
<div class="header-titulo">
    <div class="container">
        <h2 class="fw-bold m-0">Agendamentos de Containers</h2>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="container mt-4">

    <div class="row g-3">

        <!-- TOTAL -->
        <div class="col-md-3">
            <div class="card card-custom">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box icon-blue">
                        <img src="img/caixa-azul.png" class="icon-img">
                    </div>
                    <div>
                        <small>Total</small>
                        <h4 class="mb-0">2</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- PENDENTES -->
        <div class="col-md-3">
            <div class="card card-custom">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box icon-yellow">
                        <img src="img/pendente.png" class="icon-img">
                    </div>
                    <div>
                        <small>Pendentes</small>
                        <h4 class="mb-0">1</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONFIRMADOS -->
        <div class="col-md-3">
            <div class="card card-custom">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box icon-green">
                        <img src="img/caminhao.png" class="icon-img">
                    </div>
                    <div>
                        <small>Confirmados</small>
                        <h4 class="mb-0">1</h4>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTÃO -->
        <div class="col-md-3">
            <div class="card card-custom d-flex justify-content-center align-items-center h-100">
                <button class="btn btn-primary w-100 btn-agendar">
                    + Novo Agendamento
                </button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
